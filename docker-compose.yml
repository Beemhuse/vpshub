services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: vpshub-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-vpshub}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-vpshub_password}
      POSTGRES_DB: ${DB_NAME:-vpshub}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - vpshub-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-vpshub}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # NestJS Backend Server
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: vpshub-server
    env_file:
    - .env.local
    
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - vpshub-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # React Frontend Client
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: vpshub-client
    environment:
      # Frontend will proxy API requests to server in production
      VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}
    ports:
      - "5173:80"
    depends_on:
      - server
    networks:
      - vpshub-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/index.html"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

volumes:
  postgres_data:
    driver: local

networks:
  vpshub-network:
    driver: bridge
